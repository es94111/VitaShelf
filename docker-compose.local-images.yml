name: vitashelf-local-images

services:
  # ── VitaShelf (本機建置的合體 image) ──────────────────────────────────────────
  # 建置指令：docker build -t vitashelf:local .
  vitashelf:
    image: vitashelf:local
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL:  ${DATABASE_URL:-postgresql://vitashelf:vitashelf@db:5432/vitashelf}
      JWT_SECRET:    ${JWT_SECRET:-change-me-to-a-very-long-random-secret-32-plus}
      NODE_ENV:      production
      PORT:          "4001"
      CORS_ORIGIN:   ${CORS_ORIGIN:-http://localhost}
      UPLOAD_DIR:    /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Database ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-vitashelf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vitashelf}
      POSTGRES_DB:       ${POSTGRES_DB:-vitashelf}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vitashelf}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads_data:
