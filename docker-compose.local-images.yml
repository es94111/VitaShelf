name: vitashelf-local-images

services:
  frontend:
    image: vitashelf-frontend:local
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    image: vitashelf-backend:local
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://vitashelf:vitashelf@db:5432/vitashelf}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      NODE_ENV: production
      PORT: "4000"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vitashelf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vitashelf}
      POSTGRES_DB: ${POSTGRES_DB:-vitashelf}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vitashelf}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads_data:
