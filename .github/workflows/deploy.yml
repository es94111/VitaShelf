name: Lint & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: vitashelf

jobs:
  # ── Job 1: Lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # NOTE: No `cache: npm` here — lock files are not committed to the repo.
      # Using `npm install` (not `npm ci`) so the step works without lock files.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint frontend
        working-directory: frontend
        run: |
          npm install --prefer-offline --no-audit --no-fund
          npm run lint

      - name: Lint backend
        working-directory: backend
        run: |
          npm install --prefer-offline --no-audit --no-fund
          npm run lint

  # ── Job 2: Deploy (SSH) ───────────────────────────────────────────────────
  # Runs after docker-publish.yml has pushed the new image to the registry.
  # This job SSH-es into the server and pulls / restarts the container.
  deploy:
    name: Deploy
    needs: lint
    runs-on: ubuntu-latest
    # Only deploy on pushes to main (not on workflow_dispatch dry-runs unless
    # the required secrets are present).
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            # Pull latest image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            # Restart stack (assumes docker-compose.prod.yml exists on the server)
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up dangling images
            docker image prune -f
